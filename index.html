<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Barcode Stock Control</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.5;
      padding: 1rem;
      max-width: 600px;
      margin: 0 auto;
      -webkit-tap-highlight-color: transparent;
    }
    h1 { font-size: 1.4rem; margin-bottom: 1rem; color: #38bdf8; }
    .section {
      background: #1e293b;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      border: 1px solid #334155;
    }
    label { display: block; margin-bottom: 0.25rem; font-size: 0.875rem; color: #94a3b8; }
    input, button {
      width: 100%;
      padding: 0.85rem;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
      margin-bottom: 0.6rem;
      outline: none;
    }
    input:focus { border-color: #38bdf8; }
    button {
      background: #0ea5e9;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
    }
    button:active { transform: scale(0.98); }
    button:hover { background: #0284c7; }
    button.secondary { background: #475569; }
    button.secondary:hover { background: #334155; }
    
    #reader {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 0.5rem;
      min-height: 200px;
      background: #000;
    }
    #reader video { border-radius: 12px; }
    
    .inventory-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    .inventory-table th, .inventory-table td {
      text-align: left;
      padding: 0.6rem 0.4rem;
      border-bottom: 1px solid #334155;
    }
    .inventory-table th { color: #94a3b8; font-weight: 500; }
    .qty-pos { color: #4ade80; font-weight: 600; }
    .qty-neg { color: #f87171; font-weight: 600; }
    
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #1e293b;
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      max-width: 420px;
      border: 1px solid #334155;
      animation: pop 0.2s ease-out;
    }
    @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal h2 { font-size: 1.2rem; margin-bottom: 1rem; color: #38bdf8; }
    .info-row {
      background: #0f172a;
      padding: 0.75rem;
      border-radius: 8px;
      margin-bottom: 0.75rem;
    }
    .info-row .label { color: #94a3b8; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .info-row .value { font-size: 1.05rem; font-weight: 600; color: #e2e8f0; margin-top: 0.15rem; }
    .hidden { display: none !important; }
    .status { font-size: 0.875rem; color: #94a3b8; margin-top: 0.5rem; min-height: 1.2em; }
    .status.ok { color: #4ade80; }
    .status.err { color: #f87171; }
    .btn-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .btn-row button { margin-bottom: 0; }
    .scan-badge {
      display: inline-block;
      background: #0ea5e9;
      color: #fff;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <h1>📦 Barcode Stock</h1>

  <div id="configSection" class="section">
    <label>Google Apps Script Web App URL</label>
    <input type="text" id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec">
    <button onclick="saveConfig()">Save & Connect</button>
    <div id="configStatus" class="status"></div>
  </div>

  <div id="appSection" class="hidden">
    <div class="section">
      <div class="btn-row">
        <button id="btnStart" onclick="startScanner()">▶️ Start Camera</button>
        <button id="btnStop" class="secondary hidden" onclick="stopScanner()">⏹️ Stop</button>
      </div>
      <div id="reader"></div>
      <div id="scanStatus" class="status"></div>
    </div>

    <div class="section">
      <h2 style="font-size:1.05rem; margin-bottom:0.75rem;">Inventory <span id="invCount" class="scan-badge">0</span></h2>
      <div style="overflow-x:auto;">
        <table class="inventory-table">
          <thead>
            <tr><th>Item</th><th>Qty</th><th>Updated</th></tr>
          </thead>
          <tbody id="inventoryBody"></tbody>
        </table>
      </div>
      <button class="secondary" style="margin-top:0.75rem;" onclick="loadData()">🔄 Refresh</button>
    </div>
  </div>

  <div id="modal" class="modal-overlay">
    <div class="modal">
      <h2 id="modalTitle">Scan</h2>
      <div class="info-row">
        <div class="label">Barcode</div>
        <div class="value" id="modalBarcode"></div>
      </div>
      <div id="modalItemRow" class="info-row hidden">
        <div class="label">Item Name</div>
        <div class="value" id="modalItemName"></div>
      </div>
      <div id="modalQtyRow" class="info-row hidden">
        <div class="label">Current Quantity</div>
        <div class="value" id="modalCurrentQty"></div>
      </div>
      <div id="newItemInput" class="hidden">
        <label>Item Name *</label>
        <input type="text" id="inputItemName" placeholder="e.g. Red T-Shirt XL">
      </div>
      <label>Quantity to add / subtract</label>
      <input type="number" id="inputQty" value="1" step="any">
      <div class="btn-row">
        <button onclick="submitScan()">✅ Confirm</button>
        <button class="secondary" onclick="cancelScan()">❌ Cancel</button>
      </div>
      <div id="modalStatus" class="status"></div>
    </div>
  </div>

  <script>
    let gasUrl = localStorage.getItem('gasUrl') || '';
    let scanner = null;
    let currentBarcode = '';
    let currentItemName = '';
    let isNewItem = false;
    let inventoryData = [];
    let mappingData = [];
    let lastScanCode = '';
    let lastScanTime = 0;

    if (gasUrl) {
      document.getElementById('gasUrl').value = gasUrl;
      showApp();
      loadData();
    }

    function saveConfig() {
      const url = document.getElementById('gasUrl').value.trim();
      if (!url) return;
      gasUrl = url;
      localStorage.setItem('gasUrl', gasUrl);
      showApp();
      loadData();
    }

    function showApp() {
      document.getElementById('configSection').classList.add('hidden');
      document.getElementById('appSection').classList.remove('hidden');
    }

    async function loadData() {
      setStatus('Loading…', 'config');
      try {
        const res = await fetch(gasUrl, {
          method: 'POST',
          body: JSON.stringify({action: 'getData'}),
          headers: {'Content-Type': 'text/plain;charset=utf-8'}
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        inventoryData = data.inventory || [];
        mappingData = data.mappings || [];
        renderInventory();
        setStatus('Connected ✓', 'config', 'ok');
      } catch (e) {
        setStatus('Error: ' + e.message, 'config', 'err');
      }
    }

    function renderInventory() {
      const tbody = document.getElementById('inventoryBody');
      tbody.innerHTML = '';
      let count = 0;
      for (let i = 1; i < inventoryData.length; i++) {
        const row = inventoryData[i];
        const tr = document.createElement('tr');
        const qty = parseFloat(row[2]) || 0;
        const cls = qty < 0 ? 'qty-neg' : 'qty-pos';
        tr.innerHTML = `
          <td>${escapeHtml(row[1])}</td>
          <td class="${cls}">${qty}</td>
          <td>${formatDate(row[0])}</td>
        `;
        tbody.appendChild(tr);
        count++;
      }
      document.getElementById('invCount').textContent = count;
    }

    function escapeHtml(t) {
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }
    function formatDate(d) {
      if (!d) return '-';
      return new Date(d).toLocaleString(undefined, {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
    }

    async function startScanner() {
      if (!gasUrl) return;
      document.getElementById('btnStart').classList.add('hidden');
      document.getElementById('btnStop').classList.remove('hidden');
      scanner = new Html5Qrcode('reader');
      try {
        await scanner.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 250, height: 150 } },
          onScanSuccess,
          onScanFailure
        );
        setStatus('Camera active — point at a barcode', 'scan', 'ok');
      } catch (e) {
        setStatus('Camera error: ' + e.message, 'scan', 'err');
        stopScanner();
      }
    }

    async function stopScanner() {
      if (scanner) {
        try { await scanner.stop(); } catch(e){}
        scanner = null;
      }
      document.getElementById('btnStart').classList.remove('hidden');
      document.getElementById('btnStop').classList.add('hidden');
      setStatus('Scanner stopped.', 'scan');
    }

    function onScanSuccess(decodedText) {
      const now = Date.now();
      if (decodedText === lastScanCode && now - lastScanTime < 2500) return;
      lastScanTime = now;
      lastScanCode = decodedText;

      beep();
      if (navigator.vibrate) navigator.vibrate(150);
      try { scanner.pause(); } catch(e){}

      let foundName = null;
      for (let i = 1; i < mappingData.length; i++) {
        if (String(mappingData[i][0]).trim() === decodedText.trim()) {
          foundName = mappingData[i][1];
          break;
        }
      }

      if (foundName) {
        isNewItem = false;
        currentItemName = foundName;
        let currentQty = 0;
        for (let i = 1; i < inventoryData.length; i++) {
          if (String(inventoryData[i][1]).trim() === foundName.trim()) {
            currentQty = parseFloat(inventoryData[i][2]) || 0;
            break;
          }
        }
        showModal(decodedText, foundName, currentQty, false);
      } else {
        isNewItem = true;
        currentItemName = '';
        showModal(decodedText, '', 0, true);
      }
    }

    function onScanFailure(error) {}

    function showModal(barcode, itemName, currentQty, isNew) {
      currentBarcode = barcode;
      document.getElementById('modalBarcode').textContent = barcode;
      document.getElementById('modalTitle').textContent = isNew ? '➕ New Item' : '✏️ Update Item';

      if (isNew) {
        document.getElementById('modalItemRow').classList.add('hidden');
        document.getElementById('modalQtyRow').classList.add('hidden');
        document.getElementById('newItemInput').classList.remove('hidden');
        document.getElementById('inputItemName').value = '';
      } else {
        document.getElementById('modalItemRow').classList.remove('hidden');
        document.getElementById('modalQtyRow').classList.remove('hidden');
        document.getElementById('newItemInput').classList.add('hidden');
        document.getElementById('modalItemName').textContent = itemName;
        const qEl = document.getElementById('modalCurrentQty');
        qEl.textContent = currentQty;
        qEl.className = 'value ' + (currentQty < 0 ? 'qty-neg' : 'qty-pos');
      }

      document.getElementById('inputQty').value = '1';
      document.getElementById('modalStatus').textContent = '';
      document.getElementById('modal').classList.add('active');
      if (isNew) setTimeout(() => document.getElementById('inputItemName').focus(), 100);
      else setTimeout(() => document.getElementById('inputQty').focus(), 100);
    }

    function cancelScan() {
      document.getElementById('modal').classList.remove('active');
      currentBarcode = '';
      try { scanner.resume(); } catch(e){}
    }

    async function submitScan() {
      const qty = parseFloat(document.getElementById('inputQty').value);
      if (isNaN(qty)) {
        setStatus('Enter a valid number', 'modal', 'err');
        return;
      }

      let itemName = currentItemName;
      if (isNewItem) {
        itemName = document.getElementById('inputItemName').value.trim();
        if (!itemName) {
          setStatus('Enter an item name', 'modal', 'err');
          return;
        }
      }

      setStatus('Saving…', 'modal');
      try {
        const res = await fetch(gasUrl, {
          method: 'POST',
          body: JSON.stringify({
            action: 'scan',
            barcode: currentBarcode,
            itemName: itemName,
            quantity: qty
          }),
          headers: {'Content-Type': 'text/plain;charset=utf-8'}
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        await loadData();

        setStatus(`Saved: ${data.itemName} → ${data.newQty}`, 'modal', 'ok');
        setTimeout(() => {
          document.getElementById('modal').classList.remove('active');
          currentBarcode = '';
          try { scanner.resume(); } catch(e){}
        }, 1200);
      } catch (e) {
        setStatus('Error: ' + e.message, 'modal', 'err');
      }
    }

    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.08;
        osc.start();
        osc.stop(ctx.currentTime + 0.08);
      } catch(e){}
    }

    function setStatus(msg, ctx, type) {
      const id = ctx === 'config' ? 'configStatus' : ctx === 'scan' ? 'scanStatus' : 'modalStatus';
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = 'status ' + (type || '');
    }
  </script>
</body>
</html>
